interface:
  display_name: "CodeArmy"
  short_description: "以 campaign 仓库为主事实源，编排多阶段、多任务、多 repo 协作"
  default_prompt: "使用 $codearmy 在当前 Alice 会话里组织一个 repo-first 的 campaign 协作流程：优先创建或复用 campaign repo，把计划、阶段、任务、评审、报告都沉淀到 campaign repo 的 markdown/frontmatter 结构里；采用 Alice orchestrator / judge，加上 planner、planner reviewer、executor、reviewer 这些角色边界。Orchestrator 只做统筹，不写具体实现；planner 和 reviewer 走 Claude plugin，planner reviewer 和 executor 走 Codex；具体 provider / model / profile 默认交给当前运行环境或 runtime dispatch 决定，而不是写死在模板里。reviewer 只写 review 文件，judge 应用 review verdict。计划阶段先补齐 repo facts 和研究约束，再让 runtime 派发 planner / planner reviewer workflow，等待人工批准后把 ready 子任务交给 runtime 自动执行；按依赖和 write scope 控制并行，长任务通过 scheduler 自动唤醒。总结时优先基于 campaign repo 说明当前活跃 tasks、review queue、阻塞项、下一步，以及 live report / phase report / paper 的更新情况。"
